name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      run_eslint: ${{ steps.changed.outputs.run_eslint }}
      run_prettier: ${{ steps.changed.outputs.run_prettier }}
      run_typecheck: ${{ steps.changed.outputs.run_typecheck }}
      run_build: ${{ steps.changed.outputs.run_build }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changed
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" > .ci-changed.txt
          else
            git ls-files > .ci-changed.txt
          fi

          : > .ci-eslint.txt
          : > .ci-prettier.txt
          grep -E '\.(astro|ts|tsx|js|jsx)$' .ci-changed.txt >> .ci-eslint.txt || true
          grep -E '\.(astro|ts|tsx|js|jsx|md|mdx|css|json)$' .ci-changed.txt >> .ci-prettier.txt || true
          grep -E '(^src/|^astro\.config\.mjs$|^tsconfig\.json$|^src/content\.config\.ts$|^src/env\.d\.ts$|^package\.json$|^bun\.lock$|\.astro$|\.ts$|\.tsx$|\.js$|\.jsx$)' .ci-changed.txt > .ci-typecheck.txt || true
          grep -E '(^src/|^public/|^astro\.config\.mjs$|^tsconfig\.json$|^package\.json$|^bun\.lock$)' .ci-changed.txt > .ci-build.txt || true

          if [ -s .ci-eslint.txt ]; then echo "run_eslint=true" >> "$GITHUB_OUTPUT"; else echo "run_eslint=false" >> "$GITHUB_OUTPUT"; fi
          if [ -s .ci-prettier.txt ]; then echo "run_prettier=true" >> "$GITHUB_OUTPUT"; else echo "run_prettier=false" >> "$GITHUB_OUTPUT"; fi
          if [ -s .ci-typecheck.txt ]; then echo "run_typecheck=true" >> "$GITHUB_OUTPUT"; else echo "run_typecheck=false" >> "$GITHUB_OUTPUT"; fi
          if [ -s .ci-build.txt ]; then echo "run_build=true" >> "$GITHUB_OUTPUT"; else echo "run_build=false" >> "$GITHUB_OUTPUT"; fi

      - name: Upload changed file lists
        if: steps.changed.outputs.run_eslint == 'true' || steps.changed.outputs.run_prettier == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ci-changed-files
          if-no-files-found: error
          retention-days: 1
          path: |
            .ci-eslint.txt
            .ci-prettier.txt

  lint:
    name: Lint Changed Files
    needs: changes
    if: needs.changes.outputs.run_eslint == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download changed file lists
        uses: actions/download-artifact@v5
        with:
          name: ci-changed-files

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-1.3.13-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.13-

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Run ESLint on changed files
        shell: bash
        run: |
          mapfile -t files < .ci-eslint.txt
          bunx eslint --max-warnings=0 "${files[@]}"

  format:
    name: Format Check Changed Files
    needs: changes
    if: needs.changes.outputs.run_prettier == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download changed file lists
        uses: actions/download-artifact@v5
        with:
          name: ci-changed-files

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-1.3.13-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.13-

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Run Prettier on changed files
        shell: bash
        run: |
          mapfile -t files < .ci-prettier.txt
          bunx prettier --check "${files[@]}"

  typecheck:
    name: Typecheck
    needs: changes
    if: needs.changes.outputs.run_typecheck == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .astro
          key: ${{ runner.os }}-bun-1.3.13-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.13-

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.run_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .astro
          key: ${{ runner.os }}-bun-1.3.13-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.13-

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Build without auto OG generation
        env:
          CI_SKIP_AUTO_OG_IMAGE: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          CI_SKIP_RSS_SITEMAP: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          CI_SKIP_CONTENT_COLLECTIONS: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
        run: bun run build

  no-op:
    name: No-op Summary
    needs: changes
    if: needs.changes.outputs.run_eslint != 'true' && needs.changes.outputs.run_prettier != 'true' && needs.changes.outputs.run_typecheck != 'true' && needs.changes.outputs.run_build != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Nothing to validate
        run: echo "No build-impacting or lintable files changed; heavy checks skipped."

  status:
    name: PR Checks Status
    needs: [changes, lint, format, typecheck, build, no-op]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Verify upstream job results
        shell: bash
        run: |
          set -euo pipefail

          CHANGES_RESULT="${{ needs.changes.result }}"
          LINT_RESULT="${{ needs.lint.result }}"
          FORMAT_RESULT="${{ needs.format.result }}"
          TYPECHECK_RESULT="${{ needs.typecheck.result }}"
          BUILD_RESULT="${{ needs.build.result }}"
          NOOP_RESULT="${{ needs.no-op.result }}"

          echo "changes=${CHANGES_RESULT}"
          echo "lint=${LINT_RESULT}"
          echo "format=${FORMAT_RESULT}"
          echo "typecheck=${TYPECHECK_RESULT}"
          echo "build=${BUILD_RESULT}"
          echo "no-op=${NOOP_RESULT}"

          for result in "${CHANGES_RESULT}" "${LINT_RESULT}" "${FORMAT_RESULT}" "${TYPECHECK_RESULT}" "${BUILD_RESULT}" "${NOOP_RESULT}"; do
            if [ "${result}" = "failure" ] || [ "${result}" = "cancelled" ]; then
              echo "::error::One or more PR check jobs failed or were cancelled."
              exit 1
            fi
          done

          echo "All required PR checks are successful or intentionally skipped."
