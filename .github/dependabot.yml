version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    # Wait 2 days before opening PRs to avoid Bun's 24-hour 'minimum-release-age' block
    cooldown: 2
    labels:
      - dependencies
    ignore:
      - dependency-name: 'typescript'
        versions: ['>= 7.0.0']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - dependencies
